<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f5f7;
      --card: #ffffff;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --danger: #ef4444;
      --text: #1f2937;
      --muted: #9ca3af;
      --border: #e5e7eb;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .app {
      width: 100%;
      max-width: 480px;
    }

    header {
      text-align: center;
      margin-bottom: 24px;
    }

    header h1 {
      font-size: 28px;
      font-weight: 700;
    }

    header p {
      color: var(--muted);
      font-size: 14px;
      margin-top: 4px;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
      padding: 20px;
    }

    form {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus {
      border-color: var(--primary);
    }

    button {
      cursor: pointer;
      border: none;
      font-size: 15px;
      font-family: inherit;
    }

    .add-btn {
      background: var(--primary);
      color: #fff;
      padding: 0 20px;
      border-radius: 10px;
      font-weight: 600;
      transition: background 0.15s;
    }

    .add-btn:hover { background: var(--primary-hover); }

    ul { list-style: none; }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 4px;
      border-bottom: 1px solid var(--border);
    }

    li:last-child { border-bottom: none; }

    li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: var(--primary);
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-name {
      flex: 1;
      font-size: 16px;
      word-break: break-word;
    }

    li.done .item-name {
      text-decoration: line-through;
      color: var(--muted);
    }

    .delete-btn {
      background: transparent;
      color: var(--muted);
      font-size: 20px;
      line-height: 1;
      padding: 4px 8px;
      border-radius: 8px;
      transition: color 0.15s, background 0.15s;
    }

    .delete-btn:hover {
      color: var(--danger);
      background: #fef2f2;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 32px 0;
      font-size: 15px;
    }

    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--muted);
    }

    .clear-btn {
      background: transparent;
      color: var(--muted);
      text-decoration: underline;
      font-size: 13px;
    }

    .clear-btn:hover { color: var(--danger); }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>🛒 쇼핑 리스트</h1>
      <p>살 것을 추가하고, 담았으면 체크하세요</p>
    </header>

    <div class="card">
      <form id="add-form">
        <input
          type="text"
          id="item-input"
          placeholder="예: 우유, 계란, 사과..."
          autocomplete="off"
          maxlength="100"
        />
        <button type="submit" class="add-btn">추가</button>
      </form>

      <ul id="list"></ul>

      <footer>
        <span id="counter">0개 항목</span>
        <button type="button" class="clear-btn" id="clear-done">완료 항목 지우기</button>
      </footer>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://ypskzcwchyysnhhsjykj.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_eVpDae35Pd4WoE3KLk_jdw_tzWB8djP";
    const supabase = createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

    const form = document.getElementById("add-form");
    const input = document.getElementById("item-input");
    const list = document.getElementById("list");
    const counter = document.getElementById("counter");
    const clearDoneBtn = document.getElementById("clear-done");

    /** @type {{id: number, name: string, done: boolean}[]} */
    let items = [];

    async function load() {
      renderMessage("불러오는 중...");
      const { data, error } = await supabase
        .from("shopping_items")
        .select("id, name, done")
        .order("id", { ascending: true });
      if (error) {
        console.error(error);
        renderMessage("목록을 불러오지 못했어요. 잠시 후 다시 시도해 주세요.");
        return;
      }
      items = data;
      render();
    }

    function renderMessage(text) {
      list.innerHTML = "";
      const li = document.createElement("li");
      li.className = "empty";
      li.textContent = text;
      list.appendChild(li);
    }

    function render() {
      list.innerHTML = "";

      if (items.length === 0) {
        const empty = document.createElement("li");
        empty.className = "empty";
        empty.textContent = "아직 항목이 없어요. 위에서 추가해 보세요!";
        list.appendChild(empty);
      } else {
        for (const item of items) {
          const li = document.createElement("li");
          if (item.done) li.classList.add("done");

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.checked = item.done;
          checkbox.addEventListener("change", () => toggle(item.id));

          const name = document.createElement("span");
          name.className = "item-name";
          name.textContent = item.name;

          const del = document.createElement("button");
          del.type = "button";
          del.className = "delete-btn";
          del.textContent = "×";
          del.title = "삭제";
          del.addEventListener("click", () => remove(item.id));

          li.append(checkbox, name, del);
          list.appendChild(li);
        }
      }

      const remaining = items.filter((i) => !i.done).length;
      counter.textContent = `${items.length}개 항목 · ${remaining}개 남음`;
    }

    async function add(name) {
      const trimmed = name.trim();
      if (!trimmed) return;
      const { data, error } = await supabase
        .from("shopping_items")
        .insert({ name: trimmed })
        .select("id, name, done")
        .single();
      if (error) {
        console.error(error);
        return;
      }
      items.push(data);
      render();
    }

    async function toggle(id) {
      const item = items.find((i) => i.id === id);
      if (!item) return;
      const { error } = await supabase
        .from("shopping_items")
        .update({ done: !item.done })
        .eq("id", id);
      if (error) {
        console.error(error);
        render(); // 체크박스 상태 원복
        return;
      }
      item.done = !item.done;
      render();
    }

    async function remove(id) {
      const { error } = await supabase
        .from("shopping_items")
        .delete()
        .eq("id", id);
      if (error) {
        console.error(error);
        return;
      }
      items = items.filter((i) => i.id !== id);
      render();
    }

    async function clearDone() {
      const { error } = await supabase
        .from("shopping_items")
        .delete()
        .eq("done", true);
      if (error) {
        console.error(error);
        return;
      }
      items = items.filter((i) => !i.done);
      render();
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      add(input.value);
      input.value = "";
      input.focus();
    });

    clearDoneBtn.addEventListener("click", clearDone);

    load();
  </script>
</body>
</html>
